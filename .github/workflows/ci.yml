stages:
  - build
  - test

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

# 1. Build the Docker image that contains Playwright + your project
build_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -t playwright-cucumber-ui-framework .
    - docker save playwright-cucumber-ui-framework -o playwright-cucumber-ui-framework.tar
  artifacts:
    paths:
      - playwright-cucumber-ui-framework.tar
    expire_in: 1 week

# 2. Run tests inside the image and collect reports
run_tests:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker load -i playwright-cucumber-ui-framework.tar
    - docker run --rm \
        -v "$CI_PROJECT_DIR/test-results:/app/test-results" \
        playwright-cucumber-ui-framework
  artifacts:
  when: always
  expose_as: "UI Test Report"
  paths:
    - test-results/
    - test-results/html/index.html
  expire_in: 1 week
