name: Playwright Cucumber Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npm test

      - name: Generate HTML report
        run: node reports/generate-html-report.js

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: html-report
          path: reports/html/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: screenshots
          path: reports/screenshots/

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: videos
          path: videos/

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: traces
          path: test-results/
